name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - run: go test ./...
      - run: CGO_ENABLED=0 go test ./...

  browser:
    name: Browser Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install Emscripten
        uses: emscripten-core/setup-emsdk@v16
      - run: npm run build
        working-directory: packages/browser
      - run: npm test
        working-directory: packages/browser

  publish-browser:
    name: Publish Browser Package
    runs-on: ubuntu-latest
    needs:
      - go
      - browser
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Emscripten
        uses: emscripten-core/setup-emsdk@v16
      - name: Verify package version matches tag
        working-directory: packages/browser
        run: node -e "const pkg=require('./package.json'); const tag=process.env.GITHUB_REF_NAME.replace(/^v/,''); if (pkg.version !== tag) { throw new Error(`package version ${pkg.version} does not match tag ${tag}`); }"
      - run: npm run build
        working-directory: packages/browser
      - run: npm test
        working-directory: packages/browser
      - run: npm pack --dry-run
        working-directory: packages/browser
      - name: Publish to npm
        working-directory: packages/browser
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public --provenance
